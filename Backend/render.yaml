services:
  - type: web
    name: isas-backend
    runtime: python
    repo: https://github.com/YOUR_USERNAME/isas
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: isas-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app

  - type: web
    name: isas-frontend
    runtime: static
    repo: https://github.com/YOUR_USERNAME/isas
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://isas-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: isas-db
    plan: free